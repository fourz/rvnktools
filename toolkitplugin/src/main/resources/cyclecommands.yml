commands:
  cyclegamemode:
    description: Cycle through gamemodes.
    usage: /cyclegamemode
    alias: gmc
    instructions:
      creative:
        - run_command_as_player: "/gamemode creative"
      survival:
        - run_command_as_player: "/gamemode survival"
      spectator:
        - run_command_as_player: "/gamemode spectator"
  cycletrainmode:
    description: Cycle through instruction sets.
    alias: railroad
    usage: /railroad
    instructions:
      trainmodeon:
        - run_command_as_server: lp user $player permission unset group.rail-trains
        - send_message_to_player: "Newly placed minecarts will now be train minecarts."
      trainmodeoff:
        - run_command_as_server: lp user $player permission set group.rail-trains
        - send_message_to_player: "Newly placed minecarts will now be vanilla minecarts."
  countdown:
    description: Countdown for restarting the server.
    usage: /countdown
    instructions:
      5minute:
        - run_command_as_server: "broadcast &cServer restart in 5 minutes."
        - wait: 3m
      2minute:
        - run_command_as_server: "broadcast &cServer restart in 2 minutes."
        - wait: 1m
      1minute:
        - send_command_as_server: "broadcast &cServer restart in 1 minute."
        - wait: 1m
        - send_message_to_all_players: "server restarting..."
        
