commands:
  commandcycle:    
    cyclegamemode:
      description: Cycle through gamemodes.
      usage: /cyclegamemode
      alias: gmc
      sets:
        creative:
          - action: run_command_as_player
            detail: /gamemode creative
        survival:
          - action: run_command_as_player
            detail: /gamemode survival
        spectator:
          - action: run_command_as_player
            detail: /gamemode spectator
    cycletrainmode:
      description: Cycle through instruction sets.
      alias: railroad
      usage: /railroad
      sets:
        trainmodeon:
          - action: run_command_as_server
            detail: lp user $player permission unset group.rail-trains
          - action: send_message_to_player
            detail: "Newly placed minecarts will now be train minecarts."
        trainmodeoff:
          - action: run_command_as_server
            detail: lp user $player permission set group.rail-trains
          - action: send_message_to_player
            detail: "Newly placed minecarts will now be vanilla minecarts."
permissions:
  rvnktools.command.cyclegamemode:
    description: Allows the player to use the gmc command
    default: false
  rvnktools.command.cycletrainmode:
    description: Allows the player to use cycle railroad modes
    default: false    