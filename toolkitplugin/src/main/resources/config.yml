api:
  enabled: false
  port: 8080
  key: changeme
  context-path: /api

  cors:
    enabled: false
    allowed-origins: "*"
    allowed-methods: "GET,POST,DELETE,PUT,OPTIONS"

  https:
    enabled: false
    keystore-path: "keystore.jks"
    keystore-password: "changeme"

  server:
    min-threads: 2
    max-threads: 4
    queue-size: 100
    idle-timeout: 30000
    connection-timeout: 5000
    send-version: false
    use-forwarded-headers: true

  security:
    allowed-ips: ""

  logging:
    enabled: false
    retain-days: 1
    filename: "api-access-%d{yyyy-MM-dd}.log"
