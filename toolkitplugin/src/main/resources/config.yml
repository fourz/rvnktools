# RVNKTools Configuration
# Log levels: DEBUG (verbose), INFO (default), WARN (warnings), ERROR (errors only)
logging:
  level: INFO

api:
  enabled: false
  key: changeme
  context-path: /api

  http:
    port: 8080

  https:
    enabled: false
    port: 8081
    keystore-path: "keystore.jks"
    keystore-password: "changeme"

  cors:
    enabled: false
    allowed-origins: "*"
    allowed-methods: "GET,POST,DELETE,PUT,OPTIONS"

  server:
    min-threads: 2
    max-threads: 4
    queue-size: 100
    idle-timeout: 30000
    connection-timeout: 5000
    send-version: false
    use-forwarded-headers: true

  security:
    allowed-ips: ""

  logging:
    # Optional: Override global logging level for API operations
    # If not specified, uses global logging.level setting
    # level: DEBUG
    retain-days: 1
    filename: "api-access-%d{yyyy-MM-dd}.log"
