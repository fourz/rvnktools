# RVNKTools Configuration
# Main configuration for RVNKTools features

# Log levels: DEBUG (verbose), INFO (default), WARN (warnings), ERROR (errors only)
logging:
  level: INFO

# Log Filter Configuration
# Controls which types of server messages are displayed in console
logfilter:
  enabled: true
  show:
    spigot: false        # Show Spigot framework messages
    bukkit: false        # Show Bukkit framework messages
    craftbukkit: false   # Show CraftBukkit implementation messages  
    paper: false         # Show Paper-specific messages
    plugins: true        # Show plugin messages

# Feature Configuration
# Enable or disable specific RVNKTools features
features:
  announcements: true    # Announcement system
  hat-command: true      # /hat command for cosmetic items
  link-command: true     # /link command for clickable links
  world-swap: true       # World switching with location tracking
