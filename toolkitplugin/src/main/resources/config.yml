# RVNKTools Configuration
# Log levels: DEBUG (verbose), INFO (default), WARN (warnings), ERROR (errors only)
logging:
  level: INFO

# Database Configuration
# Supported types: sqlite, mysql
database:
  type: sqlite
  
  # SQLite Configuration (default)
  sqlite:
    file: rvnkcore.db
  
  # MySQL Configuration
  mysql:
    host: localhost
    port: 3306
    database: rvnktools
    username: rvnkuser
    password: secure_password
    useSSL: true
    connectionParameters: allowPublicKeyRetrieval=true
    
    # Connection Pool Configuration
    pool:
      maxConnections: 20
      minIdleConnections: 5
      connectionTimeoutMs: 30000
      idleTimeoutMs: 600000
      maxLifetimeMs: 1800000
      leakDetectionMs: 60000

# Log Filter Configuration
# Filters log messages from specified plugins based on keyword patterns
logfilter:
  enabled: true
  debug-enabled: false
  
  # List of target plugins to filter logs from
  # Add or remove plugin names as needed
  target-plugins:
    - "DHSupport"
    # - "AnotherPlugin"
    # - "ThirdPlugin"
  
  # Keywords to filter out from target plugin logs
  # Messages containing these keywords will be suppressed
  keywords:
    - "Loading chunk"
    - "Unloading chunk" 
    - "Saving chunk"
    # Add more keywords as needed

api:
  enabled: false
  host: localhost
  context-path: /api

  http:
    port: 8080

  https:
    enabled: false
    port: 8081
    keystore-path: "keystore.jks"
    keystore-password: "changeme"

  cors:
    enabled: false
    allowed-origins: "*"
    allowed-methods: "GET,POST,DELETE,PUT,OPTIONS"

  auth:
    enabled: true
    key: "changeme"

  server:
    min-threads: 2
    max-threads: 4
    queue-size: 100
    idle-timeout: 30000
    connection-timeout: 5000
    send-version: false
    use-forwarded-headers: true

  security:
    allowed-ips: ""

  logging:
    # Optional: Override global logging level for API operations
    # If not specified, uses global logging.level setting
    # level: DEBUG
    retain-days: 1
    filename: "api-access-%d{yyyy-MM-dd}.log"
