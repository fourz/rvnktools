# RVNKCore Configuration

# Log level: OFF | SEVERE | WARNING | INFO | FINE | DEBUG
# Production default: WARNING
general:
  logLevel: WARNING

# Database Configuration
# Supported types: sqlite, mysql
database:
  type: mysql
  
  # SQLite Configuration (default)
  sqlite:
    file: rvnkcore.db
  
  # MySQL Configuration
  mysql:
    host: 64.20.41.122
    port: 3306
    database: fourzorg_rvnkcore_dev
    username: fourzorg_rvnkuser
    password: INVALID_PASSWORD_TEST
    useSSL: true
    connectionParameters: allowPublicKeyRetrieval=true
    
    # Connection Pool Configuration
    pool:
      maxConnections: 20
      minIdleConnections: 5
      connectionTimeoutMs: 30000
      idleTimeoutMs: 600000
      maxLifetimeMs: 1800000
      leakDetectionMs: 60000

# API Configuration
api:
  enabled: true
  host: localhost
  context-path: /api

  http:
    port: 8080

  https:
    enabled: true
    port: 8081
    keystore-path: "keystore.jks"
    keystore-password: "changeme"

  cors:
    enabled: true
    allowed-origins: "*"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"

  auth:
    key: "9067FFAetF34576893"

  server:
    max-threads: 50
    idle-timeout: 30000
    connection-timeout: 60000
    send-version: false
    use-forwarded-headers: true

  security:
    allowed-ips: ""

  logging:
    # Optional: Override global logging level for API operations
    # If not specified, uses rvnkcore.logging.level setting
    # level: DEBUG
