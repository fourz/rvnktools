name: RVNKCore
version: 1.3.0-alpha
author: fourz
main: org.fourz.rvnkcore.RVNKCore
description: Core unified library for Ravenkraft Minecraft plugins - provides ServiceRegistry, database abstraction, REST API, and shared services
api-version: 1.21
website: http://www.fourz.org
softdepend: [Multiverse-Core, PlaceholderAPI, LuckPerms, Vault]

# RVNKCore has no commands - it's a service provider library
# Other plugins access functionality via ServiceRegistry

# Available services (registered via Bukkit Services API):
# - PlayerService: Player data management
# - WorldService: World data management
# - PlayerWorldService: Player-world relationship tracking
# - AnnouncementService: Announcement system
# - DatabaseService: Database access layer
