  recurrence: 120m  
  imported: false
- id: trains_help
  text: '&7Use &d/trains &7for train help pages.'
  type: guide
  recurrence: 1h  
  imported: false
- id: help_guide
  text: '&7Try &d/help &7for a command guide'
  type: guide
  recurrence: 2h  
  imported: false
- id: patreon
  text: '&aCheck out our &c{patreon-link}!'
  type: guide
  recurrence: 2h  
  imported: false
- id: discord
  text: '&aJoin us on &9{discord-link}!'
  type: guide
  recurrence: 2h  
  imported: false
- id: announcer
  text: '&7Use &d/announcer &7to cycle &eannouncer &7modes.'
