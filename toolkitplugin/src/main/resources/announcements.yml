  recurrence: 4h
- id: newyear
  text: "&e&lHappy &6New &e&lYear!"
  type: scheduled
  date: "12-18"


storage:
# types: mysql, sqlite, flatfile
  type: flatfile 
  mysql:
    host: localhost
    port: 3306
    username: root
    password: ''
    useSSL: false
    database: rvnktools
    tablePrefix: announce_
  sqlite:
    database: announcements.db

debug:
  # Available levels: OFF, SEVERE, WARNING, INFO, DEBUG
  # OFF: No logging
  # SEVERE: Only critical errors
  # WARNING: Errors and warnings
  # INFO: Standard operational messages
  # DEBUG: Detailed debugging information
  level: WARNING
  # Log file name (optional)
  file: announcements.log