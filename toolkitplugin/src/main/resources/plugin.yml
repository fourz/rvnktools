name: RVNKCore
version: '${project.version}'
author: fourz
main: org.fourz.rvnkcore.RVNKCore
description: Core unified library for Ravenkraft Minecraft plugins
api-version: 1.21
website: http://www.fourz.org
softdepend: [Multiverse-Core, PlaceholderAPI, LuckPerms, Vault]

commands:
  rvnktools:
    description: Main command for RVNK Tools
    usage: /rvnktools <subcommand> [args]
    aliases: [tools]
    permission: rvnktools.command
  puthat:
    description: Applies a custom Jack-o-Lantern to the nearest mob
    usage: /puthat <customModelData>
    permission: rvnktools.command.puthat
  tps:
    description: Shows the server's current TPS and performance information
    usage: /tps
    aliases: [ping]
  events:
    description: Provides information about scheduled events
    usage: /events
  discord:
    description: Provides information about the server's discord
    usage: /discord
  announce:
    description: Manages announcements
    usage: /announce <toggle|list|add|delete> [args]
    aliases: [announcement]
    permission: rvnktools.command.announce
    default: op
  broadcast:
    description: Broadcasts a message to all players
    usage: /broadcast <message>
    permission: rvnktools.command.broadcast
    default: op
  pstest:
    description: Test PlayerService functionality
    usage: /pstest <recent|groups|syncgroups> [args...]
    permission: rvnktools.admin.pstest
    default: op
  rvnkcore:
    description: RVNKCore diagnostics, testing, and system information
    usage: /rvnkcore <debug|services|db|version|reload|plugins|commands|health|test|mojang> [args]
    permission: rvnktools.admin.test
    default: op
  worldswap:
    description: Teleport to your last known location in a specific world
    usage: /worldswap <world_name>
    aliases: [ws]
    permission: rvnktools.command.worldswap
  teleport:
    description: Teleportation utilities and world management
    usage: /teleport <subcommand> [args]
    permission: rvnktools.command.teleport
  tp:
    description: Teleport command (vanilla override - disabled by default)
    usage: /tp <player|coordinates> [args]
    permission: rvnktools.command.tp
  cyclegamemode:
    description: Cycle through gamemodes
    usage: /cyclegamemode
    permission: rvnktools.command.cyclegamemode
    aliases: [gmc]
    default: op
  railroad:
    description: Cycle through instruction sets
    usage: /railroad
    aliases: [cycletrainmode]
    permission: rvnktools.command.railroad
  event:
    description: Teleport between worlds preserving location history
    usage: /event [world]
    permission: rvnktools.command.worldswap
    aliases: [worldswap]
  countdown:
    description: Countdown for restarting the server
    usage: /countdown
    permission: rvnktools.command.countdown
    default: op
  logfilter:
    description: Manage log filtering for server plugins
    usage: /logfilter <status|reload|enable|disable|add|remove|list> [args]
    permission: rvnktools.command.logfilter
    default: op
  announcer:
    description: Enable or disable announcements feature
    usage: /announcer
  trains:
    description: Manage TrainCarts settings and view help pages
    usage: /trains [enable|disable|modes|examples|links]
    aliases: [train-help]
  tpa:
    description: Request to teleport to another player
    usage: /tpa <player>
    permission: rvnktools.command.tpa
  tpahere:
    description: Request another player teleport to you
    usage: /tpahere <player>
    permission: rvnktools.command.tpahere
  tpaccept:
    description: Accept a pending teleport request
    usage: /tpaccept
    permission: rvnktools.command.tpaccept
  tpdeny:
    description: Deny a pending teleport request
    usage: /tpdeny
    permission: rvnktools.command.tpdeny
  back:
    description: Teleport to your previous location
    usage: /back
    permission: rvnktools.command.back
  link:
    description: Link your account to external services
    usage: /link <login|matrix|discord>
    permission: rvnktools.link
  pref:
    description: Manage your notification preferences
    usage: |
      /<command> - Show all preferences
      /<command> <plugin> - Show plugin preferences
      /<command> <plugin> toggle - Toggle master on/off
      /<command> <plugin> enable <type> - Enable notification type
      /<command> <plugin> disable <type> - Disable notification type
      /<command> <plugin> quiet <hour1> <hour2> - Set quiet hours (0-23)
      /<command> <plugin> quiet disable - Disable quiet hours
      /<command> <plugin> channel <type> <channel> <on|off> - Toggle channel
      /<command> <plugin> reset - Reset to defaults
    aliases: [prefs, preferences]
    permission: rvnkcore.prefs

permissions:
  rvnktools.command:
    description: Allows use of rvnktools commands
    default: op
  rvnktools.command.event:
    description: Allows teleporting to event worlds
    default: op
  rvnktools.command.return:
    description: Allows returning from event worlds
    default: op
  rvnktools.command.broadcast:
    description: Allows the player to use the broadcast command
    default: op
  rvnktools.welcome:
    description: Allows the player to get welcome messages
  rvnktools.welcome.newplayer:
    description: Sends a welcome message to new players
  rvnktools.command.cyclegamemode:
    description: Allows the player to use the gmc command
  rvnktools.command.cycletrainmode:
    description: Allows the player to use cycle railroad modes
  rvnktools.command.countdown:
    description: Allows the player to use the countdown command
  # ── Teleport ────────────────────────────────────────────────────────────────
  rvnktools.command.tp:
    description: Allows use of /tp and /teleport commands (unified node)
    default: true
  rvnktools.command.tp.others:
    description: Allows teleporting other players (/tp <p1> <p2>, /tp here, /tp <p> <x> <y> <z>)
    default: op
  rvnktools.command.tp.worldswap:
    description: Allows world-swap teleportation (/teleport worldswap, /worldswap)
    default: op
  rvnktools.command.worldswap:
    description: Allows swapping between worlds while maintaining location history (/worldswap)
    default: op
  rvnktools.command.tpa:
    description: Allows sending teleport requests
    default: true
  rvnktools.command.tpahere:
    description: Allows sending teleport-here requests
    default: true
  rvnktools.command.tpaccept:
    description: Allows accepting teleport requests
    default: true
  rvnktools.command.tpdeny:
    description: Allows denying teleport requests
    default: true
  rvnktools.command.back:
    description: Allows teleporting to previous location
    default: true
  rvnktools.tpa.bypass.cooldown:
    description: Bypass TPA cooldown timer
    default: op
  rvnktools.tpa.bypass.warmup:
    description: Bypass TPA warmup timer
    default: op

  # ── Announce ─────────────────────────────────────────────────────────────
  rvnktools.announce.*:
    description: All announcement permissions
    default: op
    children:
      rvnktools.command.announce: true
      rvnktools.command.announce.add: true
      rvnktools.command.announce.set: true
      rvnktools.command.announce.delete: true
      rvnktools.command.announce.now: true
      rvnktools.command.announce.reload: true
      rvnktools.command.announce.update: true
      rvnktools.announce.type.*: true
  rvnktools.command.announce:
    description: Allows use of the /announce command
    default: op
  rvnktools.command.announce.add:
    description: Allows adding announcements
    default: op
  rvnktools.command.announce.set:
    description: Allows modifying announcement fields
    default: op
  rvnktools.command.announce.delete:
    description: Allows deleting announcements
    default: op
  rvnktools.command.announce.now:
    description: Allows triggering an announcement immediately
    default: op
  rvnktools.command.announce.reload:
    description: Allows reloading the announcement system
    default: op
  rvnktools.command.announce.update:
    description: Allows updating announcements
    default: op
  rvnktools.announce.type.*:
    description: Allows viewing/toggling all announcement types
    default: op
  rvnktools.announce.help:
    description: Allows access to announcement help
    default: true

  # ── Admin ────────────────────────────────────────────────────────────────
  rvnktools.admin.*:
    description: All admin permissions
    default: op
    children:
      rvnktools.admin.test: true
      rvnktools.admin.pstest: true
      rvnktools.admin.reload: true
      rvnktools.admin.debug: true
      rvnktools.admin.migration: true
  rvnktools.admin.test:
    description: Allows use of automated test commands
    default: op
  rvnktools.admin.pstest:
    description: Allows use of player service test command
    default: op
  rvnktools.admin.reload:
    description: Allows reloading RVNKCore configuration
    default: op
  rvnktools.admin.debug:
    description: Allows use of debug subcommands
    default: op
  rvnktools.admin.migration:
    description: Allows running data migration commands
    default: op

  # ── Trains / Railroad ────────────────────────────────────────────────────
  rvnktools.command.trains:
    description: Allows access to train commands
  rvnktools.command.trains.enable:
    description: Allows enabling TrainCarts mode
  rvnktools.command.trains.disable:
    description: Allows disabling TrainCarts mode
  rvnktools.command.railroad:
    description: Allows toggling between minecart modes
  rvnktools.command.cycletrainmode:
    description: Allows cycling railroad modes

  # ── Misc commands ────────────────────────────────────────────────────────
  rvnktools.command.broadcast:
    description: Allows use of the broadcast command
    default: op
  rvnktools.command.puthat:
    description: Allows use of the puthat command
  rvnktools.command.cyclegamemode:
    description: Allows use of the /gmc cycle gamemode command
  rvnktools.command.countdown:
    description: Allows use of the countdown command
  rvnktools.command.logfilter:
    description: Allows managing log filtering for server plugins
    default: op
  rvnktools.command.example:
    description: Allows use of the example command
  rvnktools.command.event:
    description: Allows teleporting to event worlds
    default: op
  rvnktools.command.return:
    description: Allows returning from event worlds
    default: op

  # ── Links / Cycle ────────────────────────────────────────────────────────
  rvnktools.link:
    description: Allows linking account to external services (/link)
    default: true
  rvnktools.link.invite:
    description: Allows issuing shareable /link invite URLs (self-invite by default)
    default: op
  rvnktools.link.invite.other:
    description: Additionally allows /link invite to target a DIFFERENT player than the issuer
    default: op
  rvnktools.links:
    description: Allows access to /links command
    default: op
  rvnktools.links.reload:
    description: Allows reloading links configuration
    default: op
  rvnktools.cycle:
    description: Allows access to cycle commands
    default: op
  rvnktools.cycle.reload:
    description: Allows reloading cycle configuration
    default: op

  # ── Welcome ──────────────────────────────────────────────────────────────
  rvnktools.welcome:
    description: Allows player to receive welcome messages
  rvnktools.welcome.newplayer:
    description: Sends welcome message to new players

  # ── Preferences (rvnkcore.*) ─────────────────────────────────────────────
  rvnkcore.prefs:
    description: Manage own notification preferences
    default: true
  rvnkcore.prefs.admin:
    description: Manage notification preferences for other players
    default: op
  rvnkcore.prefs.*:
    description: All preference permissions
    default: op
    children:
      rvnkcore.prefs: true
      rvnkcore.prefs.admin: true