name: RVNKTools
version: ${project.version}
author: fourz
main: org.fourz.rvnktools.RVNKTools
description: RVNK Admin Toolkit
api: "1.0"
website: http://www.fourz.org
api-version: 1.16
depend: [PlaceholderAPI]
softdepend: [Multiverse-Core]

commands:
  rvnktools:
    description: Main command for RVNK Tools
    usage: /rvnktools <subcommand> [args]
    aliases: [rvnk]
    permission: rvnktools.command
  puthat:
    description: Applies a custom Jack-o-Lantern to the nearest mob.
    usage: /puthat <customModelData>
    permission: rvnktools.command.puthat
  ping:
    description: Shows your current ping.
    usage: /ping
  tps:
    description: Shows the server's current TPS.
    usage: /tps
  events:
    description: Provides information about scheduled events.
    usage: /events
  discord:
    description: Provides information about the server's discord.
    usage: /discord
  announce:
    description: Manages announcements.
    usage: /announce <toggle|list|add|delete> [args]
    aliases: [announcement]
    permissions: 
      - rvnktools.command.announce
    default: op      
  broadcast:
    description: Broadcasts a message to all players
    usage: /broadcast <message>
    permissions: 
      - rvnktools.command.broadcast    
    default: op      
  cyclegamemode:
    description: Cycle through gamemodes.
    usage: /cyclegamemode
    permissions: 
      - rvnktools.command.cyclegamemode
    aliases: [gmc]
    default: op    
  railroad:
    description: Cycle through instruction sets.
    aliases: [cycletrainmode]
    usage: /railroad
    permissions: 
      - rvnktools.command.railroad
  event:
    description: Teleport between worlds preserving location history
    usage: /event [world]
    permission: rvnktools.command.worldswap
    aliases: [worldswap]
  countdown:  
    description: Countdown for restarting the server.
    usage: /countdown 
    permissions: 
      - rvnktools.command.countdown
    default: op      
  announcer:
    description: Enable or disable announcements feature.
    usage: /announcer
  trains:
    description: Manage TrainCarts settings and view help pages
    usage: /trains [enable|disable|modes|examples|links]
    aliases: [train-help]
  railroad:
    description: Toggle between TrainCarts and vanilla minecart modes
    usage: /railroad
    aliases: [cycletrainmode]
    permission: rvnktools.command.railroad

permissions:
  rvnktools.command:
    description: Allows use of rvnktools commands
    default: op
  rvnktools.command.event:
    description: Allows teleporting to event worlds
    default: op
  rvnktools.command.return:
    description: Allows returning from event worlds
    default: op
  rvnktools.command.broadcast:
    description: Allows the player to use the broadcast command
    default: op
  rvnktools.welcome:
    description: Allows the player to get welcome messages
    default: true
  rvnktools.welcome.newplayer:
    description: Sends a welcome message to new players
    default: true
  rvnktools.command.cyclegamemode:
    description: Allows the player to use the gmc command
    default: false
  rvnktools.command.cycletrainmode:
    description: Allows the player to use cycle railroad modes
    default: false        
  rvnktools.command.countdown:
    description: Allows the player to use the countdown command
    default: false
  rvnktools.command.announce:
    description: Allows the player to use the announce command
    default: false
  rvnktools.command.trains:
    description: Allows access to train commands
    default: true
  rvnktools.command.trains.enable:
    description: Allows player enabling TrainCarts mode
    default: true
  rvnktools.command.trains.disable:
    description: Allows disabling TrainCarts mode
    default: true
  rvnktools.command.railroad:
    description: Allows the player to toggle between minecart modes
    default: true
  rvnktools.announce.help:
    description: Allows the player to access announcement help 
    default: true
  rvnktools.command.puthat:
    description: Allows the player to use the puthat command
    default: true
  rvnktools.links:
    description: Allows access to links commands
    default: op
  rvnktools.links.reload:
    description: Allows reloading links configuration
    default: op
  rvnktools.cycle:
    description: Allows access to cycle commands
    default: op
  rvnktools.cycle.reload:
    description: Allows reloading cycle commands configuration
    default: op
  rvnktools.command.worldswap:
    description: Allows swapping between worlds while maintaining location history
    default: op